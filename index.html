<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ConnectWorld AI — Flash</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#111;display:flex;justify-content:center;align-items:center;font-family:'DM Sans',sans-serif}

.device{
  width:375px;height:812px;
  background:#000;
  border-radius:44px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(255,255,255,0.15);
  box-shadow:0 40px 100px rgba(0,0,0,0.7),inset 0 0 0 1px rgba(255,255,255,0.05);
  display:flex;flex-direction:column;
}

/* STATUS BAR */
.status{
  height:44px;display:flex;align-items:center;
  justify-content:space-between;
  padding:12px 24px 0;
  position:absolute;top:0;left:0;right:0;z-index:100;
  color:#fff;
}
.status-time{font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif}
.status-icons{display:flex;align-items:center;gap:6px}

/* FEED */
.feed{flex:1;position:relative;overflow:hidden;cursor:grab}
.feed:active{cursor:grabbing}

/* VIDEO CARD */
.vcard{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  transition:transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.42s ease;
  will-change:transform;
  overflow:hidden;
}
.vcard.cur{transform:translateY(0);opacity:1;z-index:10}
.vcard.above{transform:translateY(-100%);opacity:0;z-index:5}
.vcard.below{transform:translateY(100%);opacity:0;z-index:5}
.vcard.hidden{display:none}

/* SCENE — full bleed SVG image */
.scene{
  position:absolute;inset:0;
  overflow:hidden;
}
.scene svg{width:100%;height:100%;display:block}
.scene-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.35) 0%,
    transparent 25%,
    transparent 50%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.88) 100%
  );
}

/* TOP NAV */
.top-nav{
  position:absolute;top:44px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  gap:28px;z-index:30;padding-top:6px;
}
.tnav-tab{
  font-size:15px;font-weight:500;color:rgba(255,255,255,0.5);
  cursor:pointer;padding-bottom:3px;
  border-bottom:2px solid transparent;
  transition:all 0.2s;letter-spacing:0.01em;
}
.tnav-tab.on{color:#fff;border-bottom-color:#fff;font-weight:600}

/* TRANSLATE BUTTON */
.xlate-btn{
  position:absolute;top:102px;right:14px;
  display:flex;align-items:center;gap:5px;
  background:rgba(30,60,220,0.78);
  backdrop-filter:blur(8px);
  border:1px solid rgba(100,140,255,0.5);
  border-radius:99px;padding:7px 13px;
  color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;z-index:30;
  font-family:'DM Sans',sans-serif;
  transition:background 0.2s;
  letter-spacing:0.02em;
}
.xlate-btn:hover{background:rgba(50,90,255,0.9)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#10e888;animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.7)}}

/* LANG PANEL */
.lang-panel{
  position:absolute;top:138px;left:10px;right:10px;
  background:rgba(8,10,24,0.97);
  border:1px solid rgba(100,140,255,0.3);
  border-radius:18px;padding:14px 12px;
  z-index:50;
  display:none;
  max-height:400px;
  flex-direction:column;gap:8px;
}
.lang-panel.open{display:flex;animation:popDown 0.2s ease}
@keyframes popDown{from{opacity:0;transform:scale(0.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.lp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.lp-title{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase}
.lp-close{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lp-search{
  width:100%;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);border-radius:10px;
  padding:8px 12px;color:#fff;font-size:13px;
  font-family:'DM Sans',sans-serif;outline:none;
}
.lp-search::placeholder{color:rgba(255,255,255,0.3)}
.lp-grid{
  display:flex;flex-direction:column;gap:1px;
  overflow-y:auto;flex:1;
}
.lp-grid::-webkit-scrollbar{width:3px}
.lp-grid::-webkit-scrollbar-thumb{background:rgba(100,140,255,0.4);border-radius:99px}
.lang-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;
  cursor:pointer;transition:background 0.15s;
  font-size:13px;color:rgba(255,255,255,0.85);
}
.lang-row:hover{background:rgba(255,255,255,0.07)}
.lang-row.sel{background:rgba(79,110,247,0.22);color:#fff}
.lang-flag{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.lang-name{flex:1;font-weight:400}
.lang-code{font-size:10px;color:rgba(255,255,255,0.3);font-weight:500}
.lang-check{font-size:13px;color:#4f6ef7}

/* AI TRANSLATING */
.ai-bar{
  position:absolute;top:138px;left:10px;right:10px;
  background:rgba(8,10,28,0.94);
  border:1px solid rgba(79,110,247,0.4);
  border-radius:12px;padding:10px 14px;
  display:none;align-items:center;gap:10px;z-index:48;
}
.ai-bar.show{display:flex;animation:popDown 0.15s ease}
.ai-spin{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(79,110,247,0.25);
  border-top-color:#4f6ef7;
  animation:spin 0.7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-bar-text{font-size:12px;color:rgba(255,255,255,0.8)}
.ai-bar-lang{color:#4f6ef7;font-weight:600}

/* BOTTOM INFO */
.bot-info{
  position:absolute;bottom:0;left:0;
  right:66px;padding:0 14px 20px;z-index:30;
}
.user-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.u-avatar{
  width:40px;height:40px;border-radius:50%;
  border:2.5px solid #fff;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:22px;background:rgba(255,255,255,0.12);
  flex-shrink:0;cursor:pointer;position:relative;
}
.u-name{font-size:14px;font-weight:600;color:#fff;flex:1;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.follow-btn{
  padding:6px 14px;border-radius:99px;
  border:2px solid #fff;
  background:transparent;color:#fff;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
  letter-spacing:0.02em;
}
.follow-btn.on{background:#fff;color:#000;border-color:#fff}
.v-desc{
  font-size:13.5px;color:rgba(255,255,255,0.95);
  line-height:1.45;margin-bottom:7px;
  text-shadow:0 1px 6px rgba(0,0,0,0.6);
}
.v-tags{font-size:12.5px;color:rgba(200,215,255,0.85);margin-bottom:8px;font-weight:500}
.v-music{
  display:flex;align-items:center;gap:7px;
  font-size:11.5px;color:rgba(255,255,255,0.7);
}
.music-disc{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  animation:spin 4s linear infinite;flex-shrink:0;
}

/* SIDE ACTIONS */
.side-actions{
  position:absolute;right:10px;bottom:16px;
  display:flex;flex-direction:column;gap:20px;align-items:center;
  z-index:30;
}
.act{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;user-select:none;
}
.act-icon{
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  transition:transform 0.15s,background 0.15s;
  border:1px solid rgba(255,255,255,0.08);
}
.act:active .act-icon{transform:scale(0.85)}
.act-label{font-size:11px;color:rgba(255,255,255,0.85);font-weight:500;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.act.liked .act-icon{background:rgba(247,37,133,0.32);border-color:rgba(247,37,133,0.4)}

/* PROGRESS BAR */
.prog-wrap{position:absolute;top:0;left:0;right:0;height:2.5px;z-index:40;background:rgba(255,255,255,0.1)}
.prog-fill{height:100%;background:rgba(255,255,255,0.7);border-radius:0 99px 99px 0;transition:width 0.08s linear}

/* BOTTOM NAV */
.bnav{
  height:84px;background:rgba(0,0,0,0.92);
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;flex-shrink:0;
  padding-bottom:20px;
  position:relative;z-index:60;
}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.bn-icon{font-size:22px;line-height:1}
.bn-label{font-size:10px;color:rgba(255,255,255,0.35);font-weight:500}
.bn.on .bn-label{color:#fff}
.bn.on .bn-icon{filter:drop-shadow(0 0 6px rgba(255,255,255,0.5))}
.bn-create{
  flex:1;display:flex;justify-content:center;align-items:center;
}
.bn-create-btn{
  width:46px;height:46px;border-radius:14px;
  background:linear-gradient(135deg,#4f6ef7,#7c3aed);
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:22px;color:#fff;
  box-shadow:0 4px 16px rgba(79,110,247,0.5);
}

/* SHEETS */
.sheet-bg{
  position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:70;
  display:none;align-items:flex-end;
}
.sheet-bg.open{display:flex;animation:fadeBg 0.2s ease}
@keyframes fadeBg{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%;background:#0d0f1e;
  border-radius:22px 22px 0 0;
  padding:14px 16px 28px;
  animation:slideUp 0.28s cubic-bezier(0.25,0.46,0.45,0.94);
  max-height:75%;display:flex;flex-direction:column;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:99px;background:rgba(255,255,255,0.18);margin:0 auto 14px}
.sheet-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:14px}

/* COMMENTS */
.comments-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.comments-list::-webkit-scrollbar{width:0}
.cmt{display:flex;gap:10px;align-items:flex-start}
.cmt-av{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cmt-body{flex:1}
.cmt-user{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:2px}
.cmt-text{font-size:13px;color:rgba(255,255,255,0.9);line-height:1.4}
.cmt-actions{display:flex;gap:10px;margin-top:4px}
.cmt-like{font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer}
.cmt-input-row{display:flex;gap:8px;align-items:center;flex-shrink:0}
.cmt-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:99px;padding:9px 14px;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.cmt-input::placeholder{color:rgba(255,255,255,0.3)}
.cmt-send{width:36px;height:36px;border-radius:50%;background:#4f6ef7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* SHARE */
.share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.share-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.share-icon{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,0.08)}
.share-label{font-size:11px;color:rgba(255,255,255,0.55)}
.share-url-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 12px}
.share-url{flex:1;font-size:11px;color:rgba(255,255,255,0.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:#4f6ef7;color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}

/* TOAST */
.toast{
  position:absolute;top:50px;left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:rgba(15,18,36,0.96);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:9px 16px;
  font-size:13px;font-weight:500;color:#fff;
  white-space:nowrap;z-index:200;
  opacity:0;transition:all 0.3s ease;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="device">

  <!-- STATUS BAR -->
  <div class="status">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="white">
        <rect x="0" y="4" width="2.5" height="7" rx="1" opacity="0.35"/>

      </div>

    <!-- SHARE SHEET -->
    <div class="sheet-bg" id="shrBg" onclick="closeSheet('shr')">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Partager</div>
        <div class="share-grid">
          <div class="share-item" onclick="toast('📋 Lien copié !');closeSheet('shr')"><div class="share-icon">📋</div><div class="share-label">Copier</div></div>
          <div class="share-item" onclick="toast('💬 Envoyé !');closeSheet('shr')"><div class="share-icon">💬</div><div class="share-label">Message</div></div>
          <div class="share-item" onclick="toast('📱 WhatsApp !');closeSheet('shr')"><div class="share-icon">📱</div><div class="share-label">WhatsApp</div></div>

          <div class="share-item" onclick="toast('🚩 Signalé');closeSheet('shr')"><div class="share-icon">🚩</div><div class="share-label">Signaler</div></div>
        </div>
        <div class="share-url-row">
          <div class="share-url">connectworld.ai/flash/v/7x9k2m</div>
          <button class="copy-btn" onclick="toast('📋 Lien copié !')">Copier le lien</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toastEl"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <div class="bn on">
      <div class="bn-icon">⚡</div>
      <div class="bn-label">Flash</div>
    </div>
    <div class="bn">
      <div class="bn-icon">📸</div>
      <div class="bn-label">Moments</div>
    </div>
    <div class="bn-create">
      <button class="bn-create-btn" onclick="toast('✨ Studio créateur ouvert !')">＋</button>
    </div>
    <div class="bn">
      <div class="bn-icon">📺</div>
      <div class="bn-label">Canaux</div>

</div>

/* ──────────────────────────────────────────
   DATA

const LANGS = [

  {f:'🇨🇿',n:'Čeština',c:'CS'},{f:'🇸🇪',n:'Svenska',c:'SV'},{f:'🇬🇷',n:'Ελληνικά',c:'EL'},

let cur = 0;
const liked = new Set();
const following = new Set();
let selLang = {f:'🇫🇷', n:'Français', c:'FR'};
let progW = 0, progTimer = null;
let allLangs = [...LANGS];

/* ──────────────────────────────────────────
   BUILD CARDS
────────────────────────────────────────── */
function fmt(n){ return n >= 1000 ? (n/1000).toFixed(1) + 'K' : n; }

function buildCards(){
  const wrap = document.getElementById('cards');
  wrap.innerHTML = VIDEOS.map((v,i) => `
    <div class="vcard ${i===0?'cur':i===1?'below':'hidden'}" id="vc${i}">
      <div class="scene">${SCENES[v.scene]()}</div>
      <div class="scene-overlay"></div>
      <div class="top-nav">
        <div class="tnav-tab">Abonnements</div>
        <div class="tnav-tab on">Pour toi</div>
        <div class="tnav-tab">Live</div>
      </div>
      <div class="bot-info">
        <div class="user-row">
          <div class="u-avatar" onclick="toast('Profil @${v.user}')">${v.av}</div>
          <div class="u-name">@${v.user}</div>
          <button class="follow-btn${following.has(i)?' on':''}" id="fb${i}" onclick="toggleFollow(${i},event)">
            ${following.has(i)?'✓ Suivi':'+ Suivre'}
          </button>
        </div>
        <div class="v-desc">${v.desc}</div>
        <div class="v-tags">${v.tags}</div>
        <div class="v-music">
          <div class="music-disc">♪</div>
          <span>${v.music}</span>
        </div>
      </div>
      <div class="side-actions">
        <div class="act${liked.has(i)?' liked':''}" id="la${i}" onclick="toggleLike(${i})">
          <div class="act-icon">${liked.has(i)?'❤️':'🤍'}</div>
          <div class="act-label" id="lc${i}">${fmt(v.likes)}</div>
        </div>
        <div class="act" onclick="openCmt(${i})">
          <div class="act-icon">💬</div>
          <div class="act-label">${fmt(v.cmts)}</div>
        </div>
        <div class="act" onclick="openShare()">
          <div class="act-icon">↗️</div>
          <div class="act-label">${fmt(v.shares)}</div>
        </div>
        <div class="act" onclick="toast('🔖 Sauvegardé !')">
          <div class="act-icon">🔖</div>
          <div class="act-label">Sauver</div>
        </div>
        <div class="act" onclick="toast('⋯ Plus d\'options')">
          <div class="act-icon" style="font-size:16px;font-weight:700;letter-spacing:1px">•••</div>
          <div class="act-label">Plus</div>
        </div>
      </div>
    </div>
  `).join('');

  updateXlateBtn();

  /* swipe / wheel */
  const feed = document.getElementById('feed');
  let sy = 0, drag = false;
  feed.addEventListener('touchstart', e => { sy = e.touches[0].clientY; drag = true; });
  feed.addEventListener('touchmove', e => { if(drag) e.preventDefault(); }, {passive:false});
  feed.addEventListener('touchend', e => {
    if(!drag) return;
    const dy = sy - e.changedTouches[0].clientY;
    if(dy > 40) nextV(); else if(dy < -40) prevV();
    drag = false;
  });
  feed.addEventListener('wheel', e => {
    e.preventDefault();
    if(e.deltaY > 25) nextV(); else if(e.deltaY < -25) prevV();
  }, {passive:false});

  startProg();
}

/* ──────────────────────────────────────────
   NAVIGATION
────────────────────────────────────────── */
function gotoV(n){
  const prev = cur;
  cur = (n + VIDEOS.length) % VIDEOS.length;

  VIDEOS.forEach((_,i) => {
    const el = document.getElementById('vc'+i);
    el.className = 'vcard';
    if(i === cur) el.classList.add('cur');
    else if(i === (cur+1) % VIDEOS.length) { el.classList.add('below'); }
    else if(i === (cur-1+VIDEOS.length) % VIDEOS.length) el.classList.add('above');
    else el.classList.add('hidden');
  });

  closeLangPanel();
  updateXlateBtn();
  startProg();
}
function nextV(){ gotoV(cur + 1); }
function prevV(){ gotoV(cur - 1); }

/* ──────────────────────────────────────────
   PROGRESS BAR
────────────────────────────────────────── */
function startProg(){
  clearInterval(progTimer);
  progW = 0;
  document.getElementById('pf').style.width = '0%';
  progTimer = setInterval(() => {
    progW += 0.4;
    document.getElementById('pf').style.width = Math.min(progW,100) + '%';
    if(progW >= 100) nextV();
  }, 100);
}

/* ──────────────────────────────────────────
   LIKE / FOLLOW
────────────────────────────────────────── */
function toggleLike(i){
  const wasLiked = liked.has(i);
  wasLiked ? liked.delete(i) : liked.add(i);
  const el = document.getElementById('la'+i);
  el.className = 'act' + (liked.has(i) ? ' liked' : '');
  el.querySelector('.act-icon').textContent = liked.has(i) ? '❤️' : '🤍';
  document.getElementById('lc'+i).textContent = fmt(VIDEOS[i].likes + (liked.has(i)?1:0));
  if(liked.has(i)) toast('❤️ Vous aimez cette vidéo !');
}

function toggleFollow(i, e){
  e.stopPropagation();
  following.has(i) ? following.delete(i) : following.add(i);
  const btn = document.getElementById('fb'+i);
  btn.className = 'follow-btn' + (following.has(i) ? ' on' : '');
  btn.textContent = following.has(i) ? '✓ Suivi' : '+ Suivre';
  toast(following.has(i) ? '✅ Abonné à @'+VIDEOS[i].user : '👋 Désabonné de @'+VIDEOS[i].user);
}

/* ──────────────────────────────────────────
   TRANSLATE
────────────────────────────────────────── */
function updateXlateBtn(){
  const v = VIDEOS[cur];
  document.getElementById('xlateLabel').textContent = `🌐 ${v.src} → ${selLang.c}`;
}

function toggleLangPanel(){
  const p = document.getElementById('langPanel');
  const isOpen = p.classList.contains('open');
  p.classList.toggle('open', !isOpen);
  if(!isOpen){
    renderLangs('');
    const s = document.getElementById('lpSearch');
    s.value = '';
    setTimeout(() => s.focus(), 50);
  }
}
function closeLangPanel(){ document.getElementById('langPanel').classList.remove('open'); }

function renderLangs(q){
  const f = q ? LANGS.filter(l =>
    l.n.toLowerCase().includes(q.toLowerCase()) ||
    l.c.toLowerCase().includes(q.toLowerCase())
  ) : LANGS;

  document.getElementById('lpGrid').innerHTML = f.map(l => `
    <div class="lang-row${selLang.c===l.c?' sel':''}" onclick="selectLang('${l.f}','${l.n}','${l.c}')">
      <span class="lang-flag">${l.f}</span>
      <span class="lang-name">${l.n}</span>
      <span class="lang-code">${l.c}</span>
      ${selLang.c===l.c?'<span class="lang-check">✓</span>':''}
    </div>
  `).join('');
}

function filterLangs(){ renderLangs(document.getElementById('lpSearch').value); }

function selectLang(f,n,c){
  selLang = {f,n,c};
  closeLangPanel();

  const bar = document.getElementById('aiBar');
  document.getElementById('aiLangSpan').textContent = c;
  bar.classList.add('show');

  setTimeout(() => {
    bar.classList.remove('show');
    updateXlateBtn();
    toast(`🌐 Vidéo traduite en ${f} ${n} !`);
  }, 2000);
}

/* ──────────────────────────────────────────
   COMMENTS
────────────────────────────────────────── */
function openCmt(i){
  const v = VIDEOS[i];
  document.getElementById('cmtTitle').textContent = `${fmt(v.cmts)} commentaires`;
  document.getElementById('cmtList').innerHTML = v.comments.map(c => `
    <div class="cmt">
      <div class="cmt-av">${c.av}</div>
      <div class="cmt-body">
        <div class="cmt-user">${c.u}</div>
        <div class="cmt-text">${c.t}</div>
        <div class="cmt-actions">
          <span class="cmt-like" onclick="toast('👍 J\'aime ce commentaire')">👍 J'aime</span>
          <span class="cmt-like" onclick="toast('💬 Répondre...')">Répondre</span>
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('cmtBg').classList.add('open');
}

function sendCmt(){
  const inp = document.getElementById('cmtInput');
  const txt = inp.value.trim();
  if(!txt) return;
  const list = document.getElementById('cmtList');
  list.insertAdjacentHTML('afterbegin', `
    <div class="cmt">
      <div class="cmt-av">😊</div>
      <div class="cmt-body">
        <div class="cmt-user">@moi</div>
        <div class="cmt-text">${txt}</div>
      </div>
    </div>
  `);
  inp.value = '';
  toast('💬 Commentaire publié !');
}

/* ──────────────────────────────────────────
   SHARE
────────────────────────────────────────── */
function openShare(){ document.getElementById('shrBg').classList.add('open'); }

function closeSheet(id){
  document.getElementById(id === 'cmt' ? 'cmtBg' : 'shrBg').classList.remove('open');
}

/* ──────────────────────────────────────────
   TOAST
────────────────────────────────────────── */
let toastT;
function toast(msg){
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ──────────────────────────────────────────
   INIT
────────────────────────────────────────── */
buildCards();
</script>
</body>
</html>
